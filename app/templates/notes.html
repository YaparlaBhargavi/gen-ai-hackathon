<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes | AI Productivity</title>
    <link rel="stylesheet" href="/static/premium.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .note-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 30px;
            align-items: start;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .note-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .note-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            padding-right: 30px;
        }

        .note-content {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .note-date {
            font-size: 0.8rem;
            color: #64748b;
        }

        .note-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .note-card:hover .note-actions {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .note-actions { opacity: 1; }
        }

        .action-btn {
            background: rgba(0,0,0,0.3);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            transform: scale(1.05);
        }
        
        .action-btn.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        .note-form-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .note-form-container:focus-within {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .note-form-container input {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 16px 20px;
        }

        .note-form-container textarea {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 1rem;
            padding: 0 20px;
            min-height: 40px;
            resize: none;
            line-height: 1.5;
            transition: min-height 0.3s;
        }

        .note-form-container input:focus, .note-form-container textarea:focus {
            box-shadow: none;
        }

        .form-footer {
            display: flex;
            justify-content: flex-end;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <h2>AI Prod.</h2>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link"><i class="fas fa-check-square"></i><span>Tasks</span></a></li>
            <li class="nav-item"><a href="/notes" class="nav-link active"><i class="fas fa-file-alt"></i><span>Notes</span></a></li>
            <li class="nav-item"><a href="/calendar" class="nav-link"><i class="fas fa-calendar-day"></i><span>Calendar</span></a></li>
            <li class="nav-item"><a href="/workflows" class="nav-link"><i class="fas fa-project-diagram"></i><span>Workflows</span></a></li>
            <li class="nav-item"><a href="/analytics" class="nav-link"><i class="fas fa-chart-pie"></i><span>Analytics</span></a></li>
            <li class="nav-item" style="margin-top: auto;"><a href="/profile" class="nav-link"><i class="fas fa-user"></i><span>Profile</span></a></li>
            <li class="nav-item"><a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="header">
            <div>
                <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Notes Library <i class="fas fa-pen-nib" style="color: var(--accent); font-size: 1.5rem;"></i></h1>
                <p>Capture, tag, and search your thoughts instantly.</p>
            </div>
        </header>

        <div style="max-width: 800px; margin: 0 auto;">
            <div class="note-form-container" id="noteFormContainer">
                <input type="text" id="noteTitle" placeholder="Note Title...">
                <textarea id="noteContent" placeholder="Take a note..." onfocus="expandForm()" oninput="auto_grow(this)"></textarea>
                <div class="form-footer" id="noteFormFooter">
                    <button class="btn-primary" onclick="createNote()"><i class="fas fa-check"></i> Save Note</button>
                </div>
            </div>
        </div>

        <div class="note-grid" id="notesList">
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Fetching notes...</div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        document.addEventListener('click', function(event) {
            const form = document.getElementById('noteFormContainer');
            if (!form.contains(event.target) && document.getElementById('noteContent').value === '' && document.getElementById('noteTitle').value === '') {
                collapseForm();
            }
        });

        function expandForm() {
            document.getElementById('noteContent').style.minHeight = '150px';
            document.getElementById('noteFormFooter').style.display = 'flex';
        }

        function collapseForm() {
            document.getElementById('noteContent').style.minHeight = '40px';
            document.getElementById('noteFormFooter').style.display = 'none';
        }

        function auto_grow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight)+"px";
        }

        function showToast(message, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'access_token') return value;
            }
            window.location.href = '/login';
            return null;
        }

        async function fetchAPI(url, options = {}) {
            const token = getToken();
            const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers };
            try {
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401) { window.location.href = '/login'; return null; }
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.message || `HTTP Error ${response.status}`);
                return data;
            } catch (err) {
                showToast(err.message, 'error');
                throw err;
            }
        }

        async function loadNotes() {
            try {
                const notes = await fetchAPI('/api/notes?limit=100');
                const container = document.getElementById('notesList');
                
                if (!notes || notes.length === 0) {
                    container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px; font-size: 1.1rem;">
                        <i class="far fa-sticky-note" style="font-size: 3rem; margin-bottom: 20px; display: block; opacity: 0.5;"></i>
                        No notes yet. Feel free to jot something down.
                    </div>`;
                    return;
                }

                container.innerHTML = notes.map(note => `
                    <div class="note-card">
                        <div class="note-actions">
                            <button class="action-btn delete" onclick="deleteNote(${note.id})" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="note-title">${escapeHtml(note.title)}</div>
                        <div class="note-content">${escapeHtml(note.content)}</div>
                        <div class="note-date"><i class="far fa-clock"></i> ${new Date(note.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function createNote() {
            const title = document.getElementById('noteTitle').value.trim() || 'Untitled Note';
            const content = document.getElementById('noteContent').value.trim();

            if (!content) {
                showToast("Note content cannot be empty", "error");
                return;
            }

            try {
                await fetchAPI('/api/notes', { method: 'POST', body: JSON.stringify({ title, content }) });
                showToast("Note saved!");
                document.getElementById('noteTitle').value = '';
                document.getElementById('noteContent').value = '';
                document.getElementById('noteContent').style.height = '40px';
                collapseForm();
                loadNotes();
            } catch (e) {}
        }

        async function deleteNote(noteId) {
            if (!confirm("Are you sure you want to delete this note?")) return;
            try {
                await fetchAPI(`/api/notes/${noteId}`, { method: 'DELETE' });
                showToast("Note deleted");
                loadNotes();
            } catch (e) {}
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadNotes();
    </script>

    <script src="/static/theme.js"></script>
</body>
</html>

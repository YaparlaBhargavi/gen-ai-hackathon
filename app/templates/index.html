<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Platform</title>
    <link rel="stylesheet" href="/static/premium.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            max-width: 800px;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.6;
        }

        .features {
            display: flex;
            gap: 20px;
            margin-top: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-item {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 24px 30px;
            border-radius: var(--card-radius);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-main);
            font-weight: 500;
        }

        .feature-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Top Navigation -->
    <nav style="position: absolute; top: 0; left: 0; right: 0; padding: 30px 40px; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-brain"></i></div>
            <h2>AI Prod.</h2>
        </div>
        <div style="display: flex; gap: 15px;">
            <a href="/login" style="color: var(--text-main); text-decoration: none; font-weight: 600; padding: 12px 24px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); transition: all 0.3s; display: inline-block;">Log In</a>
        </div>
    </nav>

    <div class="hero">
        <div style="display: inline-block; padding: 6px 16px; background: rgba(99, 102, 241, 0.15); color: #818cf8; border-radius: 30px; border: 1px solid rgba(99, 102, 241, 0.3); font-size: 0.9rem; font-weight: 600; margin-bottom: 24px; letter-spacing: 0.5px;">
            <i class="fas fa-sparkles"></i> MEET YOUR NEW ASSISTANT
        </div>
        <h1>Elevate Your Workflow with AI</h1>
        <p>A beautifully simple, incredibly powerful productivity suite tailored around an AI assistant that understands your needs.</p>
        
        <div style="display: flex; gap: 20px;">
            <a href="/signup" class="btn-primary" style="font-size: 1.1rem; padding: 16px 32px; text-decoration: none;">Get Started for Free <i class="fas fa-arrow-right"></i></a>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-robot"></i></div>
                Contextual AI Chat
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-check-square"></i></div>
                Smart Task tracking
            </div>
            <div class="feature-item">
                <div class="feature-icon"><i class="fas fa-project-diagram"></i></div>
                Workflows Integration
            </div>
        </div>
    </div>

    <script src="/static/theme.js"></script>
</body>
</html>

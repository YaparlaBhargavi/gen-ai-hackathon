<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | AI Productivity</title>
    <link rel="stylesheet" href="/static/premium.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .task-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 6px; height: 100%;
            border-radius: 16px 0 0 16px;
        }

        .task-card.priority-high::before { background: #ef4444; }
        .task-card.priority-medium::before { background: #f59e0b; }
        .task-card.priority-low::before { background: #10b981; }

        .task-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            padding-left: 10px;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            padding-left: 10px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <h2>AI Prod.</h2>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link active"><i class="fas fa-check-square"></i><span>Tasks</span></a></li>
            <li class="nav-item"><a href="/notes" class="nav-link"><i class="fas fa-file-alt"></i><span>Notes</span></a></li>
            <li class="nav-item"><a href="/calendar" class="nav-link"><i class="fas fa-calendar-day"></i><span>Calendar</span></a></li>
            <li class="nav-item"><a href="/workflows" class="nav-link"><i class="fas fa-project-diagram"></i><span>Workflows</span></a></li>
            <li class="nav-item"><a href="/analytics" class="nav-link"><i class="fas fa-chart-pie"></i><span>Analytics</span></a></li>
            <li class="nav-item" style="margin-top: auto;"><a href="/profile" class="nav-link"><i class="fas fa-user"></i><span>Profile</span></a></li>
            <li class="nav-item"><a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="header">
            <div>
                <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Task Management <i class="fas fa-check-circle" style="color: var(--accent); font-size: 1.5rem;"></i></h1>
                <p>Prioritize your workload and crush your goals.</p>
            </div>
        </header>

        <div class="glass-card" style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 20px; font-weight: 600;">Create New Task</h3>
            <form id="createTaskForm" onsubmit="event.preventDefault(); createTask();" style="display: flex; flex-wrap: wrap; gap: 15px; align-items: stretch;">
                <input type="text" id="taskTitle" placeholder="What needs to be done?" style="flex: 2; min-width: 250px;" required>
                <select id="taskUrgency" style="flex: 1; min-width: 150px;">
                    <option value="5" selected>Medium Priority (5/10)</option>
                    <option value="3">Low Priority (3/10)</option>
                    <option value="8">High Priority (8/10)</option>
                    <option value="10">Critical Priority (10/10)</option>
                </select>
                <input type="date" id="taskDueDate" style="flex: 1; min-width: 150px; color-scheme: dark;">
                <button type="submit" class="btn-primary" style="flex: 0 0 auto;">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </form>
        </div>

        <div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterTasks('pending')">Pending</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
                <button class="filter-btn" onclick="filterTasks('all')">All Tasks</button>
            </div>
            
            <div class="task-grid" id="tasksList">
                <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">Loading your tasks...</div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script>
        let allTasks = [];
        let currentFilter = 'pending';

        function showToast(message, type='success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'access_token') return value;
            }
            window.location.href = '/login';
            return null;
        }

        async function fetchAPI(url, options = {}) {
            const token = getToken();
            if (!token) return null;

            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };

            try {
                const response = await fetch(url, { ...options, headers });
                if (response.status === 401) {
                    window.location.href = '/login';
                    return null;
                }
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.message || `HTTP Error ${response.status}`);
                return data;
            } catch (err) {
                console.error("API Error:", err);
                throw err;
            }
        }

        async function loadTasks() {
            try {
                allTasks = await fetchAPI('/api/tasks?limit=100');
                renderTasks();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function filterTasks(status) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasksList');
            let filteredTasks = allTasks;

            if (currentFilter === 'pending') {
                filteredTasks = allTasks.filter(t => t.task_status !== 'completed');
            } else if (currentFilter === 'completed') {
                filteredTasks = allTasks.filter(t => t.task_status === 'completed');
            }

            if (!filteredTasks || filteredTasks.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">
                    <i class="fas fa-clipboard-check" style="font-size: 3rem; margin-bottom: 20px; display: block; opacity: 0.5;"></i>
                    No ${currentFilter === 'all' ? '' : currentFilter} tasks found.
                </div>`;
                return;
            }

            container.innerHTML = filteredTasks.map(task => {
                let priorityClass = 'priority-medium';
                if (task.urgency >= 8) priorityClass = 'priority-high';
                else if (task.urgency <= 3) priorityClass = 'priority-low';

                const isCompleted = task.task_status === 'completed';
                const dueText = task.due_date ? new Date(task.due_date).toLocaleDateString() : 'No Due Date';

                return `
                    <div class="task-card ${priorityClass}">
                        <div class="task-title" style="text-decoration: ${isCompleted ? 'line-through' : 'none'}; opacity: ${isCompleted ? '0.6' : '1'};">
                            ${escapeHtml(task.title)}
                        </div>
                        <div class="task-meta">
                            <i class="far fa-clock"></i> Due: ${dueText} | Urgency: ${task.urgency}/10
                        </div>
                        <div class="task-actions" style="margin-top: 10px;">
                            ${!isCompleted ? `<button class="btn-success" onclick="updateTaskStatus(${task.id}, 'completed')"><i class="fas fa-check"></i></button>` 
                            : `<button class="btn-success" onclick="updateTaskStatus(${task.id}, 'pending')" style="background: rgba(255,255,255,0.1); color: white;"><i class="fas fa-undo"></i></button>`}
                            <button class="filter-btn" style="padding: 6px 12px; font-size: 0.9em;" onclick="shareTask(${task.id})"><i class="fas fa-share-alt"></i> Share</button>
                            <button class="filter-btn" style="padding: 6px 12px; font-size: 0.9em;" onclick="openChat(${task.id})"><i class="fas fa-comments"></i> Chat</button>
                            <button class="btn-danger" onclick="deleteTask(${task.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const urgency = document.getElementById('taskUrgency').value;
            const dueDate = document.getElementById('taskDueDate').value;

            if (!title) return;

            const payload = {
                title: title,
                urgency: parseInt(urgency),
                due_date: dueDate ? dueDate + "T23:59:59" : null
            };

            try {
                await fetchAPI('/api/tasks', { method: 'POST', body: JSON.stringify(payload) });
                showToast("Task created successfully!");
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDueDate').value = '';
                loadTasks();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function updateTaskStatus(taskId, status) {
            try {
                await fetchAPI(`/api/tasks/${taskId}`, { method: 'PUT', body: JSON.stringify({ task_status: status }) });
                showToast(`Task marked as ${status}!`);
                loadTasks();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function deleteTask(taskId) {
            if (!confirm("Delete this task?")) return;
            try {
                await fetchAPI(`/api/tasks/${taskId}`, { method: 'DELETE' });
                showToast("Task deleted.");
                loadTasks();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function shareTask(taskId) {
            const email = window.prompt("Enter the email to share this task with:");
            if (!email) return;
            try {
                // Mock API call to collaboration agent
                showToast(`Task shared with ${email} successfully!`, 'success');
            } catch (e) {
                showToast("Could not share task", "error");
            }
        }
        
        async function openChat(taskId) {
            const msg = window.prompt("Add a comment to this task:");
            if (!msg) return;
            try {
                // Mock API call to collaboration agent
                showToast(`Comment added to task: ${msg}`, 'success');
            } catch (e) {
                showToast("Could not add comment", "error");
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadTasks();
    </script>

    <script src="/static/theme.js"></script>
</body>
</html>

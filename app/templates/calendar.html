<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | Advitiyans Bot</title>
    <link rel="stylesheet" href="/static/premium.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
            margin-top: 30px;
        }

        .events-list {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            height: fit-content;
            max-height: 70vh;
            overflow-y: auto;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.3s;
            position: relative;
        }

        .event-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .event-time {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .event-title {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
            font-size: 1rem;
        }

        .event-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .event-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-sync {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn-sync:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .form-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            height: fit-content;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .sync-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-left: 10px;
        }

        .sync-status.synced {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .sync-status.pending {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .calendar-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <h2>Advitiyans</h2>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link"><i class="fas fa-check-square"></i><span>Tasks</span></a></li>
            <li class="nav-item"><a href="/notes" class="nav-link"><i class="fas fa-file-alt"></i><span>Notes</span></a></li>
            <li class="nav-item"><a href="/calendar" class="nav-link active"><i class="fas fa-calendar-day"></i><span>Calendar</span></a></li>
            <li class="nav-item"><a href="/workflows" class="nav-link"><i class="fas fa-project-diagram"></i><span>Workflows</span></a></li>
            <li class="nav-item"><a href="/analytics" class="nav-link"><i class="fas fa-chart-pie"></i><span>Analytics</span></a></li>
            <li class="nav-item" style="margin-top: auto;"><a href="/profile" class="nav-link"><i class="fas fa-user"></i><span>Profile</span></a></li>
            <li class="nav-item"><a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </nav>

    <div class="main-content">
        <header class="header">
            <div>
                <button class="mobile-nav-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Calendar <i class="fas fa-calendar-alt" style="color: var(--accent); font-size: 1.5rem;"></i></h1>
                <p>Manage your schedule and sync with Google Calendar</p>
            </div>
        </header>

        <div class="calendar-container">
            <div class="form-section">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> Schedule Event</h3>
                <div>
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Event Title *</label>
                        <input type="text" id="eventTitle" placeholder="e.g., Team Meeting, Project Review...">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Description</label>
                        <textarea id="eventDescription" placeholder="Event description or notes..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-day"></i> Start Date & Time *</label>
                        <input type="datetime-local" id="eventStart">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar-check"></i> End Date & Time</label>
                        <input type="datetime-local" id="eventEnd">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-location-dot"></i> Location</label>
                        <input type="text" id="eventLocation" placeholder="e.g., Conference Room, Zoom Link...">
                    </div>
                    <button type="button" class="btn-primary" onclick="createEvent()" style="width: 100%; margin-top: 10px;">
                        <i class="fas fa-save"></i> Create Event
                    </button>
                </div>
            </div>

            <div class="events-list">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h3><i class="fas fa-list"></i> Upcoming Events</h3>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="refreshEvents()" class="btn-small btn-sync" style="padding: 6px 12px;">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
                <div id="eventsContainer">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading your schedule...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <style>
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid;
        }

        .toast.success { border-left-color: #22c55e; }
        .toast.error { border-left-color: #ef4444; }
        .toast.info { border-left-color: #3b82f6; }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>

    <script>
        // Check authentication immediately
        function checkAuth() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return false;
            }
            return true;
        }

        // Set default datetime to now
        const now = new Date();
        now.setMinutes(0, 0, 0);
        document.getElementById('eventStart').value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

        // Set default end time to 1 hour later
        const endTime = new Date(now.getTime() + 3600000);
        document.getElementById('eventEnd').value = new Date(endTime.getTime() - endTime.getTimezoneOffset() * 60000).toISOString().slice(0, 16);

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'access_token') {
                    return value;
                }
            }
            return null;
        }

        async function fetchAPI(url, options = {}) {
            const token = getToken();

            if (!token) {
                console.error('No token found, redirecting to login');
                window.location.href = '/login';
                return null;
            }

            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };

            try {
                const response = await fetch(url, { ...options, headers });

                if (response.status === 401) {
                    console.error('Unauthorized, redirecting to login');
                    window.location.href = '/login';
                    return null;
                }

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || data.detail || data.message || `HTTP Error ${response.status}`);
                }

                return data;
            } catch (err) {
                console.error('API Error:', err);
                showToast(err.message, 'error');
                throw err;
            }
        }

        async function loadEvents() {
            try {
                const response = await fetchAPI('/api/calendar/events');
                const container = document.getElementById('eventsContainer');

                if (!response) {
                    return;
                }

                if (!response.success || !response.events || response.events.length === 0) {
                    container.innerHTML = `<div class="empty-state">
                        <i class="far fa-calendar"></i>
                        <p>No upcoming events found.</p>
                        <small>Create your first event using the form!</small>
                    </div>`;
                    return;
                }

                const events = response.events;
                // Sort events by start time
                events.sort((a, b) => new Date(a.start) - new Date(b.start));

                container.innerHTML = events.map(event => {
                    const start = new Date(event.start);
                    const end = event.end ? new Date(event.end) : null;
                    const formattedDate = start.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    const formattedStartTime = start.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
                    const formattedEndTime = end ? end.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' }) : null;

                    const isPast = start < new Date();

                    return `
                        <div class="event-card" style="${isPast ? 'opacity: 0.6;' : ''}">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div style="flex: 1;">
                                    <div class="event-time">
                                        <i class="far fa-calendar-alt"></i> ${formattedDate}
                                        <i class="far fa-clock" style="margin-left: 10px;"></i> ${formattedStartTime}
                                        ${formattedEndTime ? ` - ${formattedEndTime}` : ''}
                                    </div>
                                    <div class="event-title">${escapeHtml(event.title)}</div>
                                    ${event.location ? `<div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;"><i class="fas fa-location-dot"></i> ${escapeHtml(event.location)}</div>` : ''}
                                    ${event.description ? `<div class="event-description">${escapeHtml(event.description)}</div>` : ''}
                                    <div class="event-actions">
                                        <button class="btn-small btn-sync" onclick="syncEventToGoogle(${event.id})">
                                            <i class="fab fa-google"></i> Sync to Google
                                        </button>
                                        <button class="btn-small btn-danger" onclick="deleteEvent(${event.id})">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </div>
                                </div>
                                ${event.status === 'synced' ? '<span class="sync-status synced"><i class="fas fa-check"></i> Synced</span>' : '<span class="sync-status pending"><i class="fas fa-clock"></i> Pending</span>'}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('eventsContainer').innerHTML = `<div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>Error loading events</p>
                    <button onclick="loadEvents()" class="btn-small btn-sync" style="margin-top: 10px;">Try Again</button>
                </div>`;
            }
        }

        async function refreshEvents() {
            showToast("Refreshing events...", "info");
            await loadEvents();
        }

        async function createEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const description = document.getElementById('eventDescription').value.trim();
            const start = document.getElementById('eventStart').value;
            let end = document.getElementById('eventEnd').value;
            const location = document.getElementById('eventLocation').value.trim();

            if (!title) {
                showToast("Please provide an event title", "error");
                return;
            }

            if (!start) {
                showToast("Please select a start date and time", "error");
                return;
            }

            // Parse dates
            let isoStart, isoEnd = null;
            try {
                const dStart = new Date(start);
                if (isNaN(dStart.getTime())) throw new Error('Invalid start date');
                isoStart = dStart.toISOString();

                if (end) {
                    const dEnd = new Date(end);
                    if (isNaN(dEnd.getTime())) throw new Error('Invalid end date');
                    isoEnd = dEnd.toISOString();
                } else {
                    // Set end time to 1 hour after start if not provided
                    const dEnd = new Date(dStart.getTime() + 3600000);
                    isoEnd = dEnd.toISOString();
                }
            } catch (e) {
                showToast("Invalid date format: " + e.message, "error");
                return;
            }

            const payload = {
                title: title,
                description: description || "Created via Advitiyans Bot Calendar",
                start_time: isoStart,
                end_time: isoEnd,
                location: location || ""
            };

            const btn = document.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            try {
                const response = await fetchAPI('/api/calendar/events', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (response && response.success) {
                    showToast("Event created successfully!");
                    // Clear form
                    document.getElementById('eventTitle').value = '';
                    document.getElementById('eventDescription').value = '';
                    document.getElementById('eventLocation').value = '';
                    // Reset dates
                    const newNow = new Date();
                    newNow.setMinutes(0, 0, 0);
                    document.getElementById('eventStart').value = new Date(newNow.getTime() - newNow.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                    const newEnd = new Date(newNow.getTime() + 3600000);
                    document.getElementById('eventEnd').value = new Date(newEnd.getTime() - newEnd.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
                    // Reload events
                    await loadEvents();
                }
            } catch (error) {
                showToast("Failed to create event: " + error.message, "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function deleteEvent(eventId) {
            if (!confirm("Are you sure you want to delete this event?")) return;

            try {
                const response = await fetchAPI(`/api/calendar/events/${eventId}`, {
                    method: 'DELETE'
                });

                if (response && response.success) {
                    showToast("Event deleted successfully!");
                    await loadEvents();
                }
            } catch (error) {
                showToast("Failed to delete event: " + error.message, "error");
            }
        }

        async function syncEventToGoogle(eventId) {
            showToast("Syncing event to Google Calendar...", "info");

            try {
                const response = await fetchAPI(`/api/calendar/events/${eventId}/sync`, {
                    method: 'POST'
                });

                if (response && response.success) {
                    showToast("Event synced to Google Calendar!");
                    await loadEvents();
                }
            } catch (error) {
                showToast("Failed to sync: " + error.message, "error");
            }
        }

        function escapeHtml(text) {
            if (!text) return "";
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load events on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadEvents();

                // Auto-refresh every 30 seconds
                setInterval(loadEvents, 30000);
            }
        });
    </script>

    <script src="/static/theme.js"></script>
</body>
</html>

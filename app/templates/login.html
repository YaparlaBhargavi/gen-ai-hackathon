<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Productivity</title>
    <link rel="stylesheet" href="/static/premium.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="bottom: 10%; right: 20%;"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="width: 60px; height: 60px; background: var(--primary-gradient); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);">
                    <i class="fas fa-brain" style="color: white;"></i>
                </div>
                <h2 style="font-size: 1.8rem; margin-bottom: 8px;">Welcome Back</h2>
                <p style="color: var(--text-muted);">Sign in to your AI workspace</p>
            </div>

            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; color: #fca5a5; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username or Email</label>
                    <input type="text" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
            </form>
            
            <div style="display: flex; align-items: center; margin: 24px 0; color: var(--text-muted); font-size: 0.9rem;">
                <div style="flex-grow: 1; height: 1px; background: var(--glass-border);"></div>
                <span style="padding: 0 10px;">Or continue with</span>
                <div style="flex-grow: 1; height: 1px; background: var(--glass-border);"></div>
            </div>

            <button onclick="document.getElementById('googleLoader').style.display='inline-block'; window.location.href='/api/auth/google/login'" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-weight: 500; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" style="width: 18px; height: 18px;">
                Sign in with Google <i class="fas fa-spinner fa-spin" id="googleLoader" style="display: none;"></i>
            </button>
            
            <div style="text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="/signup" style="color: var(--accent); text-decoration: none; font-weight: 500;">Create one</a>
            </div>
        </div>
    </div>

    <script src="/static/theme.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | AI Productivity Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }

        .sidebar {
            position: fixed; left: 0; top: 0; width: 280px; height: 100%;
            background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #e2e8f0; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .nav-menu { list-style: none; padding: 20px; }
        .nav-item { margin-bottom: 8px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #64748b; text-decoration: none; border-radius: 12px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }

        .main-content { margin-left: 280px; padding: 30px; }
        .profile-card { background: white; border-radius: 20px; padding: 30px; max-width: 600px; margin: 0 auto; }
        .avatar-large { width: 100px; height: 100px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 20px; color: white; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; }

        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><div class="logo-icon">🤖</div><h2>AI Productivity</h2></div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="/tasks" class="nav-link"><i class="fas fa-tasks"></i><span>Tasks</span></a></li>
            <li class="nav-item"><a href="/notes" class="nav-link"><i class="fas fa-sticky-note"></i><span>Notes</span></a></li>
            <li class="nav-item"><a href="/calendar" class="nav-link"><i class="fas fa-calendar-alt"></i><span>Calendar</span></a></li>
            <li class="nav-item"><a href="/workflows" class="nav-link"><i class="fas fa-diagram-project"></i><span>Workflows</span></a></li>
            <li class="nav-item"><a href="/analytics" class="nav-link"><i class="fas fa-chart-line"></i><span>Analytics</span></a></li>
            <li class="nav-item"><a href="/profile" class="nav-link active"><i class="fas fa-user-circle"></i><span>Profile</span></a></li>
            <li class="nav-item"><a href="/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="profile-card">
            <div class="avatar-large">
                <i class="fas fa-user"></i>
            </div>
            <h2 style="text-align: center; margin-bottom: 30px;">{{ user.full_name }}</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="{{ user.username }}" disabled>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" value="{{ user.email }}" disabled>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" value="{{ user.full_name }}">
            </div>
            <div class="form-group">
                <label>Language</label>
                <select id="language">
                    <option value="en" {% if user.language == 'en' %}selected{% endif %}>English</option>
                    <option value="hi" {% if user.language == 'hi' %}selected{% endif %}>हिंदी</option>
                    <option value="te" {% if user.language == 'te' %}selected{% endif %}>తెలుగు</option>
                    <option value="kn" {% if user.language == 'kn' %}selected{% endif %}>ಕನ್ನಡ</option>
                    <option value="ta" {% if user.language == 'ta' %}selected{% endif %}>தமிழ்</option>
                </select>
            </div>
            <div class="form-group">
                <label>Theme</label>
                <select id="theme">
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light</option>
                    <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark</option>
                </select>
            </div>
            <button onclick="updateProfile()">Update Profile</button>
        </div>
    </div>

    <script>
        function getToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'access_token') return value;
            }
            return null;
        }

        async function updateProfile() {
            const fullName = document.getElementById('fullName').value;
            const language = document.getElementById('language').value;
            const theme = document.getElementById('theme').value;

            const token = getToken();
            await fetch('/api/profile', {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ full_name: fullName, language, theme })
            });

            alert('Profile updated successfully!');
            location.reload();
        }
    </script>

    <script src="/static/theme.js"></script>
</body>
</html>
